name: Build plugin release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -E "^[[:space:]]*\\* Version:" zwembadforum-advertentie-statistieken.php | sed -E "s/.*Version:[[:space:]]*//")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build WordPress plugin zip
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD_DIR="$(mktemp -d)"
          PLUGIN_DIR="${BUILD_DIR}/zwembadforum-advertentie-statistieken"
          mkdir -p "${PLUGIN_DIR}"
          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".gitignore" \
            --exclude "*.zip" \
            ./ "${PLUGIN_DIR}/"
          cd "${BUILD_DIR}"
          zip -r "${GITHUB_WORKSPACE}/zwembadforum-advertentie-statistieken-${VERSION}.zip" zwembadforum-advertentie-statistieken

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: zwembadforum-advertentie-statistieken-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
